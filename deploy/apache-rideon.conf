<VirtualHost *:80>
    ServerName taxi-admin.mili.ge
    ServerAlias taxi-dispatch.mili.ge taxi-api.mili.ge
    DocumentRoot /var/www/html

    SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on
    RemoteIPHeader X-Forwarded-For

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/rideon-error.log
    CustomLog ${APACHE_LOG_DIR}/rideon-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName taxi.mili.ge
    DocumentRoot /var/www/landing

    SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on
    RemoteIPHeader X-Forwarded-For

    <Directory /var/www/landing>
        Options FollowSymLinks
        AllowOverride None
        DirectoryIndex index.php
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/rideon-landing-error.log
    CustomLog ${APACHE_LOG_DIR}/rideon-landing-access.log combined
</VirtualHost>
