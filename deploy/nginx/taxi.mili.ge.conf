server {
    listen 80;
    listen [::]:80;
    server_name taxi.mili.ge taxi-admin.mili.ge taxi-dispatch.mili.ge taxi-api.mili.ge;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/taxi-reserved/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name taxi.mili.ge;

    ssl_certificate /etc/letsencrypt/live/taxi.mili.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taxi.mili.ge/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64m;

    location / {
        auth_basic "Mili Taxi preview";
        auth_basic_user_file /etc/nginx/.htpasswd-droptaxi;

        proxy_pass http://127.0.0.1:9180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name taxi-admin.mili.ge taxi-dispatch.mili.ge;

    ssl_certificate /etc/letsencrypt/live/taxi.mili.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taxi.mili.ge/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = taxi-admin.mili.ge) {
        return 302 https://taxi.mili.ge/admin/;
    }

    return 302 https://taxi.mili.ge/admin/dispatch.php;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name taxi-api.mili.ge;

    ssl_certificate /etc/letsencrypt/live/taxi-api.mili.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taxi-api.mili.ge/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 308 https://taxi.mili.ge$request_uri;
}

